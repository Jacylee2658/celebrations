<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy Mother's Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,600;9..144,700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #4a2b3d;
    --bg2: #241017;
    --gold: #d4a24c;
    --rose: #e8a6b8;
    --sage: #8fae86;
    --cream: #faf3ec;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height: 100%;
    background: radial-gradient(ellipse at top, var(--bg1) 0%, var(--bg2) 75%);
    overflow: hidden;
    font-family: 'Sora', sans-serif;
  }
  #canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
  .stage { position: relative; height: 100dvh; width: 100%; display: flex; align-items: center; justify-content: center; }

  /* ---- Flower bud (pre-open) ---- */
  #bud {
    position: relative;
    cursor: pointer;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
    animation: sway 3.6s ease-in-out infinite;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }
  .stem {
    width: 4px;
    height: 60px;
    background: var(--sage);
    border-radius: 2px;
    margin-top: -6px;
  }
  .bud-shape {
    width: 46px;
    height: 64px;
    background: linear-gradient(160deg, var(--rose), #c76f89);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow: 0 18px 40px rgba(232,166,184,0.3);
  }
  .hint {
    font-size: 14px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--sage);
    opacity: 0.9;
  }

  /* ---- Bloomed flower (petals via CSS, shown briefly then fades to reveal) ---- */
  #bloom {
    position: absolute;
    z-index: 9;
    width: 10px; height: 10px;
    display: none;
  }
  .petal {
    position: absolute;
    width: 70px; height: 100px;
    background: linear-gradient(160deg, var(--rose), #c76f89);
    border-radius: 50% 50% 50% 50% / 65% 65% 35% 35%;
    top: -50px; left: -35px;
    transform-origin: center bottom;
    opacity: 0;
  }
  #bloom.open .petal { animation: petalOpen 0.9s cubic-bezier(.2,1.6,.4,1) forwards; }
  .petal:nth-child(1) { animation-delay: 0s; transform: rotate(0deg) scale(0.3); }
  .petal:nth-child(2) { animation-delay: 0.05s; transform: rotate(60deg) scale(0.3); }
  .petal:nth-child(3) { animation-delay: 0.1s; transform: rotate(120deg) scale(0.3); }
  .petal:nth-child(4) { animation-delay: 0.15s; transform: rotate(180deg) scale(0.3); }
  .petal:nth-child(5) { animation-delay: 0.2s; transform: rotate(240deg) scale(0.3); }
  .petal:nth-child(6) { animation-delay: 0.25s; transform: rotate(300deg) scale(0.3); }
  @keyframes petalOpen {
    0% { opacity: 0; }
    30% { opacity: 1; }
    100% { opacity: 1; transform: rotate(var(--r,0deg)) scale(1) translateY(-40px); }
  }
  .petal:nth-child(1){ --r:0deg;} .petal:nth-child(2){ --r:60deg;} .petal:nth-child(3){ --r:120deg;}
  .petal:nth-child(4){ --r:180deg;} .petal:nth-child(5){ --r:240deg;} .petal:nth-child(6){ --r:300deg;}
  .center-dot {
    position: absolute; top: -18px; left: -18px;
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--gold);
    box-shadow: 0 0 30px rgba(212,162,76,0.6);
    z-index: 2;
    opacity: 0;
    animation: dotIn 0.5s ease 0.5s forwards;
  }
  @keyframes dotIn { to { opacity: 1; } }

  /* ---- Reveal ---- */
  #reveal {
    position: absolute; z-index: 10;
    display: none; flex-direction: column; align-items: center; text-align: center;
    padding: 32px; max-width: 640px;
    opacity: 0; transform: scale(0.85);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(.2,1.4,.4,1);
  }
  #reveal.show { display: flex; opacity: 1; transform: scale(1); }
  .eyebrow { font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 18px; }
  .headline {
    font-family: 'Fraunces', serif; font-weight: 600; font-style: italic;
    font-size: clamp(2.2rem, 8.5vw, 4rem); line-height: 1.08; color: var(--cream); margin-bottom: 22px;
  }
  .headline span { color: var(--rose); font-style: normal; font-weight: 700; }
  .message { font-size: clamp(1rem, 2.6vw, 1.2rem); line-height: 1.7; color: rgba(250,243,236,0.82); font-weight: 300; max-width: 480px; }
  .signoff { margin-top: 28px; font-family: 'Fraunces', serif; font-style: italic; font-size: 1.1rem; color: var(--sage); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="stage">
  <div id="bud">
    <div class="bud-shape"></div>
    <div class="stem"></div>
    <div class="hint">Tap to bloom</div>
  </div>

  <div id="bloom">
    <div class="center-dot"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    <div class="petal"></div><div class="petal"></div><div class="petal"></div>
  </div>

  <div id="reveal">
    <div class="eyebrow">For the one who gave everything</div>
    <h1 class="headline">Happy Mother's Day,<br><span id="nameSlot">Ma</span></h1>
    <p class="message" id="msgSlot">Thank you for every quiet sacrifice, every late night, every ounce of love you never asked to be repaid. Today is for you.</p>
    <div class="signoff" id="fromSlot"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name') || 'Ma';
  const msg = params.get('msg') || "Thank you for every quiet sacrifice, every late night, every ounce of love you never asked to be repaid. Today is for you.";
  const from = params.get('from');

  document.getElementById('nameSlot').textContent = name;
  document.getElementById('msgSlot').textContent = msg;
  if (from) document.getElementById('fromSlot').textContent = '— ' + from;
  document.title = "Happy Mother's Day, " + name;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const petalColors = ['#e8a6b8', '#d4a24c', '#8fae86', '#f4c9d6'];
  let particles = [];

  function petalFall(count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * W,
        y: -20 - Math.random() * 100,
        vx: (Math.random() - 0.5) * 1.2,
        vy: 1 + Math.random() * 1.8,
        size: 8 + Math.random() * 10,
        color: petalColors[Math.floor(Math.random() * petalColors.length)],
        rot: Math.random() * 360,
        vrot: (Math.random() - 0.5) * 4,
        sway: Math.random() * Math.PI * 2,
        life: 1
      });
    }
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.sway += 0.02;
      p.x += p.vx + Math.sin(p.sway) * 0.6;
      p.y += p.vy;
      p.rot += p.vrot;
      p.life -= 0.0025;

      ctx.save();
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.translate(p.x, p.y); 
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, p.size * 0.55, p.size, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    particles = particles.filter(p => p.life > 0 && p.y < H + 50);
    requestAnimationFrame(tick);
  }
  tick();

  setInterval(() => { if (Math.random() > 0.7) petalFall(1); }, 600);

  const bud = document.getElementById('bud');
  const bloom = document.getElementById('bloom');
  const reveal = document.getElementById('reveal');
  let opened = false;

  bud.addEventListener('click', () => {
    if (opened) return;
    opened = true;

    const rect = bud.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height * 0.3;

    bud.style.opacity = '0';
    bud.style.transform = 'scale(0.6)';

    bloom.style.left = cx + 'px';
    bloom.style.top = cy + 'px';
    bloom.style.display = 'block';
    requestAnimationFrame(() => bloom.classList.add('open'));

    petalFall(50);
    setTimeout(() => petalFall(30), 200);

    setTimeout(() => {
      bud.style.display = 'none';
      bloom.style.display = 'none';
      reveal.classList.add('show');
    }, 900);
  });
</script>

</body>
</html>

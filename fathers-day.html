<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy Father's Day</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Sora:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #1c2530;
    --bg2: #0a0d12;
    --copper: #c17f3e;
    --amber: #d99a52;
    --steel: #5b7a99;
    --cream: #f2ece3;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height: 100%;
    background: radial-gradient(ellipse at top, var(--bg1) 0%, var(--bg2) 75%);
    overflow: hidden;
    font-family: 'Sora', sans-serif;
  }
  #canvas { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
  .stage { position: relative; height: 100dvh; width: 100%; display: flex; align-items: center; justify-content: center; perspective: 900px; }

  /* ---- Pocket watch (closed) ---- */
  #watch {
    position: relative;
    cursor: pointer;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    transform-style: preserve-3d;
    animation: gentle 4s ease-in-out infinite;
    transition: opacity 0.5s ease;
  }
  @keyframes gentle {
    0%, 100% { transform: rotate(-1.5deg); }
    50% { transform: rotate(1.5deg); }
  }
  .case {
    position: relative;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #8a5a2f, #5c3a1c 70%);
    box-shadow: 0 22px 50px rgba(0,0,0,0.5), inset 0 0 0 5px #3d2513;
  }
  .crown {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 18px; background: #6b4322; border-radius: 3px;
  }
  .lid {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--copper), #8a5a2f 75%);
    box-shadow: inset 0 0 0 4px rgba(0,0,0,0.25);
    transform-origin: left center;
    transition: transform 1s cubic-bezier(.3,1.3,.4,1);
    backface-visibility: hidden;
  }
  .lid::after {
    content: '✦';
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(242,236,227,0.5);
    font-size: 20px;
  }
  #watch.opened .lid { transform: rotateY(-150deg); }

  .hint { font-size: 14px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--steel); opacity: 0.9; }

  /* ---- Reveal ---- */
  #reveal {
    position: absolute; z-index: 10;
    display: none; flex-direction: column; align-items: center; text-align: center;
    padding: 32px; max-width: 640px;
    opacity: 0; transform: scale(0.85);
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(.2,1.4,.4,1);
  }
  #reveal.show { display: flex; opacity: 1; transform: scale(1); }
  .eyebrow { font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--amber); margin-bottom: 18px; }
  .headline {
    font-family: 'Fraunces', serif; font-weight: 600;
    font-size: clamp(2.2rem, 8.5vw, 4rem); line-height: 1.08; color: var(--cream); margin-bottom: 22px;
  }
  .headline span { color: var(--amber); }
  .message { font-size: clamp(1rem, 2.6vw, 1.2rem); line-height: 1.7; color: rgba(242,236,227,0.8); font-weight: 300; max-width: 480px; }
  .signoff { margin-top: 28px; font-family: 'Fraunces', serif; font-style: italic; font-size: 1.1rem; color: var(--steel); }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="stage">
  <div id="watch">
    <div class="case">
      <div class="crown"></div>
      <div class="lid"></div>
    </div>
    <div class="hint">Tap to open</div>
  </div>

  <div id="reveal">
    <div class="eyebrow">Steady, always</div>
    <h1 class="headline">Happy Father's Day,<br><span id="nameSlot">Sir</span></h1>
    <p class="message" id="msgSlot">Thank you for the quiet strength, the steady hand, and every lesson you taught without saying a word. Today is for you.</p>
    <div class="signoff" id="fromSlot"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const name = params.get('name') || 'Sir';
  const msg = params.get('msg') || "Thank you for the quiet strength, the steady hand, and every lesson you taught without saying a word. Today is for you.";
  const from = params.get('from');

  document.getElementById('nameSlot').textContent = name;
  document.getElementById('msgSlot').textContent = msg;
  if (from) document.getElementById('fromSlot').textContent = '— ' + from;
  document.title = "Happy Father's Day, " + name;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const sparkColors = ['#d99a52', '#c17f3e', '#f2ece3', '#5b7a99'];
  let particles = [];

  function sparkBurst(cx, cy, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 5;
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1.5,
        size: 2 + Math.random() * 3,
        color: sparkColors[Math.floor(Math.random() * sparkColors.length)],
        life: 1
      });
    }
  }

  function tick() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => {
      p.vy += 0.05;
      p.vx *= 0.98;
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.008;

      ctx.save();
      ctx.globalAlpha = Math.max(p.life, 0);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    particles = particles.filter(p => p.life > 0);
    requestAnimationFrame(tick);
  }
  tick();

  setInterval(() => { if (Math.random() > 0.75) sparkBurst(Math.random() * W, Math.random() * H, 1); }, 400);

  const watch = document.getElementById('watch');
  const reveal = document.getElementById('reveal');
  let opened = false;

  watch.addEventListener('click', () => {
    if (opened) return;
    opened = true;
    watch.classList.add('opened');

    const rect = watch.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    sparkBurst(cx, cy, 90);
    setTimeout(() => sparkBurst(cx, cy, 60), 300);

    setTimeout(() => {
      watch.style.opacity = '0';
      setTimeout(() => {
        watch.style.display = 'none';
        reveal.classList.add('show');
      }, 400);
    }, 1100);
  });
</script>

</body>
</html>
